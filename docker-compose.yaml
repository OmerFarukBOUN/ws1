version: "3.9"

services:
  node1:
    image: ubuntu:latest
    container_name: chat_node1
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y netcat-openbsd python3 &&
      tail -f /dev/null
      "
    volumes:
      - .:/code
    networks:
      chatnet:
        ipv4_address: 192.168.100.10

  node2:
    image: ubuntu:latest
    container_name: chat_node2
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y netcat-openbsd python3 &&
      tail -f /dev/null
      "
    volumes:
      - .:/code
    networks:
      chatnet:
        ipv4_address: 192.168.100.11

networks:
  chatnet:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
